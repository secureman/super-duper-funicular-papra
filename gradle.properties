# Required for any AndroidX-based project (Compose, Navigation, DataStore, etc.)
android.useAndroidX=true
android.nonTransitiveRClass=true

# Suppresses the "AGP 8.5.2 not tested with compileSdk 35" warning seen in
# your last build log. It's just a warning, not a failure, but this quiets it.
android.suppressUnsupportedCompileSdk=35

org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
kotlin.code.style=official
